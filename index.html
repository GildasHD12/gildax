
<!DOCTYPE html>
<html lang="fr" class="scroll-smooth">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=0" />
    <title>ZAYAMARKET - Votre Marché en Ligne </title>
    <meta name="description" content="Courses rapides, produits frais et locaux en Afrique." />
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script>
      tailwind.config = {
        theme: {
          extend: {
            keyframes: {
              'slide-up': {
                '0%': { transform: 'translateY(100%)' },
                '100%': { transform: 'translateY(0)' },
              },
              'zoom-in': {
                '0%': { opacity: '0', transform: 'scale(0.95)' },
                '100%': { opacity: '1', transform: 'scale(1)' },
              },
              'slide-in-right': {
                '0%': { transform: 'translateX(100%)' },
                '100%': { transform: 'translateX(0)' },
              },
               'slide-in-left': {
                '0%': { transform: 'translateX(-100%)' },
                '100%': { transform: 'translateX(0)' },
              }
            },
            animation: {
              'slide-up': 'slide-up 0.3s ease-out forwards',
              'zoom-in': 'zoom-in 0.2s ease-out forwards',
              'slide-in-right': 'slide-in-right 0.3s ease-out forwards',
              'slide-in-left': 'slide-in-left 0.3s ease-out forwards',
            }
          }
        }
      }
    </script>
    <style>
      body {
        font-family: 'Poppins', sans-serif;
        background-color: #f8fafc;
        -webkit-tap-highlight-color: transparent;
        overscroll-behavior-y: none; /* Prevents pull-to-refresh on mobile if not desired */
      }
      /* Hide scrollbar for horizontal scrolling areas */
      .no-scrollbar::-webkit-scrollbar {
        display: none;
      }
      .no-scrollbar {
        -ms-overflow-style: none;
        scrollbar-width: none;
      }
      
      .root { 
        color: green, 
        font-size: 20px,
        background-color: yellow,
      }
      button:hover {
       background-color: brown}
      button {
        background-color: green,
        padding:10px,
        cursor:pointer,
        margin:10px 25px,
        border-radius:10px
      }
     h1{
       color: red,
       top:20px,
       rigth:15px
       left:18px
     }
    </style>
