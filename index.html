<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gildax</title>
    <style>
        body {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            min-height: 100vh;
            margin: 0;
            font-family: Arial, sans-serif;
            color: #333;
        }
        .container {
            padding: 20px;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.3);
            box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
        }
        button {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            border: none;
            border-radius: 10px;
            box-shadow: 5px 5px 15px #d1d1d1,
                        -5px -5px 15px #ffffff;
            color: #333;
            font-size: 16px;
            padding: 10px 20px;
            cursor: pointer;
            transition: 0.3s;
        }
        button:hover {
            background: linear-gradient(145deg, #e6e6e6, #ffffff);
            box-shadow: 2px 2px 10px #d1d1d1,
                        -2px -2px 10px #ffffff;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Welcome to Gildax</h1>
        <p>This is a sample webpage styled with glassmorphism and modern buttons. Enjoy your stay!</p>
        <button>Click Me</button>
    </div>
</body>
</html>
